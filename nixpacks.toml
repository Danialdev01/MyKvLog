# GD is bundled in php84's default extension list via nixpkgs 24.11
# pkgs/development/interpreters/php/8.4.nix (base.withExtensions includes gd).
# Do not try to add php84Packages.gd — that flat attribute does not exist in this
# nixpkgs version and the Nix evaluation will fail with 'attribute gd missing'.
[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci || npm install"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan storage:link || true"
]

[start]
cmd = "chmod -R 777 /app/storage /app/bootstrap/cache && php artisan config:clear && php artisan route:clear && php artisan view:clear && php artisan serve --host=0.0.0.0 --port=8000"