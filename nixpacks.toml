# GD extension: the correct Nix attribute is php84Extensions.gd (NOT
# php84Packages.gd, which does not exist and breaks Nix eval).
[phases.setup]
nixPkgs = ["php84", "php84Extensions.gd", "php84Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci || npm install"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan storage:link || true"
]

[start]
cmd = "chmod -R 777 /app/storage /app/bootstrap/cache && php artisan config:clear && php artisan route:clear && php artisan view:clear && php artisan serve --host=0.0.0.0 --port=8000"