# nixpacks.toml — Dokploy + Cloudflare deployment config for Laravel

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci || npm install"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan storage:link || true"
]

[start]
cmd = "chmod -R 777 /app/storage /app/bootstrap/cache && php artisan config:clear && php artisan route:clear && php artisan view:clear && node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf && (php-fpm -y /assets/php-fpm.conf & nginx -c /nginx.conf)"
